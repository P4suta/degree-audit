name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: check / lint / test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Svelte + TypeScript check
        uses: docker/build-push-action@v6
        with:
          context: .
          target: check
          push: false
          cache-from: type=gha,scope=degree-audit
          cache-to: type=gha,mode=max,scope=degree-audit

      - name: Biome lint
        uses: docker/build-push-action@v6
        with:
          context: .
          target: lint
          push: false
          cache-from: type=gha,scope=degree-audit
          cache-to: type=gha,mode=max,scope=degree-audit

      - name: Vitest with coverage
        uses: docker/build-push-action@v6
        with:
          context: .
          target: test
          push: false
          cache-from: type=gha,scope=degree-audit
          cache-to: type=gha,mode=max,scope=degree-audit
