name: degree-audit

x-app: &app
  build:
    context: .
    target: deps
  image: degree-audit-dev
  working_dir: /app
  init: true
  environment:
    - CI=0
    - CHOKIDAR_USEPOLLING=1
  volumes:
    - .:/app
    - node_modules:/app/node_modules
    - svelte_kit:/app/.svelte-kit

services:
  dev:
    <<: *app
    command: bun run dev --host 0.0.0.0 --port 5173
    ports:
      - "5173:5173"

  preview:
    <<: *app
    command: bun run preview --host 0.0.0.0 --port 4173
    ports:
      - "4173:4173"

  check:
    <<: *app
    command: bun run check

  lint:
    <<: *app
    command: bun run lint

  test:
    <<: *app
    command: bun run test:run

  coverage:
    <<: *app
    command: bun run test:coverage

volumes:
  node_modules:
  svelte_kit:
